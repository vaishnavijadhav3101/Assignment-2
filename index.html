<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Registration</title>
<!-- Bootstrap -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
<div class="card p-4 shadow">
<h3 class="mb-3">User Registration</h3>
<form id="regForm">
<input type="text" id="name" class="form-control mb-3" placeholder="Enter
Name" required>
<input type="email" id="email" class="form-control mb-3" placeholder="Enter
Email" required>
<input type="password" id="password" class="form-control mb-3"
placeholder="Enter Password" required>
<button class="btn btn-primary w-100">Register</button>
</form>
<a href="data.html" class="btn btn-success mt-3">View Users</a>
</div>
</div>
<script>
let users = JSON.parse(localStorage.getItem("users")) || [];
document.getElementById("regForm").addEventListener("submit", function(e) {
e.preventDefault();
let user = {
name: document.getElementById("name").value, email:
document.getElementById("email").value,
password: document.getElementById("password").value
};
// Push to array
users.push(user);
// Save to localStorage
localStorage.setItem("users", JSON.stringify(users));
// AJAX POST (simulation using fetch)
fetch("https://jsonplaceholder.typicode.com/posts", {
method: "POST",
body: JSON.stringify(user),
headers: {
"Content-Type": "application/json"
}

</script>
</body>
</html>
