<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard</title>
<!-- Bootstrap CSS -->
<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
rel="stylesheet">
<style>
body {
background-color: #f8f9fa;
}
.sidebar {
height: 100vh;
background-color: #343a40;
color: white;
}
.sidebar a {
color: white;
text-decoration: none;
display: block;
padding: 10px;}
.sidebar a:hover {
background-color: #495057;
}
.card {
border-radius: 12px;
}
</style>
</head>
<body>
<div class="container-fluid">
<div class="row">
<!-- Sidebar -->
<nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
<h4 class="text-center">Dashboard</h4>
<hr>
<a href="#">Home</a>
<a href="#">Students</a>
<a href="#">Courses</a>
<a href="#">Exams</a>
<a href="#">Reports</a>
<a href="#">Settings</a>
</nav>
<!-- Main Content -->
<main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
<h2 class="mb-4">Admin Dashboard</h2>
<!-- Cards -->
<div class="row g-4">
<div class="col-md-6 col-lg-3">
<div class="card shadow-sm p-3">
<h5>Total Students</h5>
<h3>1,250</h3>
</div>
</div>
<div class="col-md-6 col-lg-3">
<div class="card shadow-sm p-3">
<h5>Total Courses</h5>
<h3>85</h3>
</div>
</div>
<div class="col-md-6 col-lg-3">
<div class="card shadow-sm p-3">
<h5>Exams Conducted</h5>
<h3>32</h3>
</div>
</div>
<div class="col-md-6 col-lg-3">
<div class="card shadow-sm p-3">
<h5>Revenue</h5>
<h3>₹2.5L</h3>
</div>
</div>
</div>
<!-- Table -->
<div class="mt-5">
<h4>Recent Activity</h4>
<table class="table table-striped">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Course</th>
<th>Status</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>Rahul</td>
<td>Java</td>
<td>Active</td>
</tr>
<tr>
<td>2</td>
<td>Sneha</td>
<td>Python</td>
<td>Completed</td>
</tr>
<tr>
<td>3</td>
<td>Amit</td>
<td>Web Dev</td>
<td>Pending</td>
</tr>
</tbody>
</table>
</div>
</main>
</div>
</div>
</body>
</html>
